<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin - Corona Mundial 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/styles.css?v=20260602-6" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top"><div class="container"><a class="navbar-brand" href="index.html"><img class="navbar-logo" src="assets/img/logo-corona-original.png" onerror="this.onerror=null;this.src='assets/img/logo-corona.jpg';" alt="Ingenio La Corona"><span class="navbar-title">Admin Mundial 2026<small>Ingenio La Corona</small></span></a></div></nav>
  <header class="page-header dashboard-premium-bg section-with-bg"><div class="container"><p class="eyebrow mb-2">Operacion MVP</p><h1 class="h2 section-title">Administracion</h1><p class="mb-0 text-muted">Gestion de fixture, resultados y sincronizacion.</p></div></header>
  <main class="dashboard-premium-bg section-with-bg py-5">
    <div class="container">
    <div id="adminLock" class="card corona-card admin-lock mx-auto"><div class="card-body"><form id="adminLoginForm"><label class="form-label">Clave administrativa</label><input class="form-control mb-3" type="password" name="admin_key" required><button class="btn btn-corona" type="submit">Ingresar</button></form></div></div>
    <div id="adminStatus" class="status-message mt-3"></div>
    <div id="adminPanel" class="d-none">
      <div class="row g-4">
        <div class="col-lg-6">
          <div class="card corona-card h-100"><div class="card-body"><h2 class="h5">Crear o editar partido</h2>
            <form id="matchForm" class="row g-3">
              <input type="hidden" name="partido_id">
              <div class="col-md-6"><label class="form-label">Fase</label><input class="form-control" name="fase" required></div>
              <div class="col-md-6"><label class="form-label">Estado</label><select class="form-select" name="estado"><option>programado</option><option>finalizado</option></select></div>
              <div class="col-md-6"><label class="form-label">Equipo A</label><input class="form-control" name="equipo_a" required></div>
              <div class="col-md-6"><label class="form-label">Equipo B</label><input class="form-control" name="equipo_b" required></div>
              <div class="col-md-6"><label class="form-label">Fecha partido</label><input class="form-control" type="datetime-local" name="fecha_partido" required></div>
              <div class="col-md-6"><label class="form-label">Fecha limite prediccion</label><input class="form-control" type="datetime-local" name="fecha_limite_prediccion" required></div>
              <div class="col-12"><button class="btn btn-corona" type="submit">Guardar partido</button></div>
            </form>
          </div></div>
        </div>
        <div class="col-lg-6">
          <div class="card corona-card h-100"><div class="card-body"><h2 class="h5">Cargar resultado</h2>
            <form id="resultForm" class="row g-3">
              <div class="col-12"><label class="form-label">Partido</label><select class="form-select" id="result_partido_id" name="partido_id" required></select></div>
              <div class="col-md-6"><label class="form-label">Goles A</label><input class="form-control" type="number" min="0" name="goles_a_real" required></div>
              <div class="col-md-6"><label class="form-label">Goles B</label><input class="form-control" type="number" min="0" name="goles_b_real" required></div>
              <div class="col-12"><label class="form-label">Cargado por</label><input class="form-control" name="cargado_por" value="Admin"></div>
              <div class="col-12 d-flex flex-wrap gap-2"><button class="btn btn-corona" type="submit">Guardar resultado</button><button class="btn btn-gold" id="recalcButton" type="button">Recalcular rankings</button><button class="btn btn-outline-secondary" id="syncFixtureButton" type="button">Sincronizar fixture</button></div>
            </form>
          </div></div>
        </div>
      </div>
      <div class="card corona-card mt-4"><div class="table-responsive"><table class="table table-hover mb-0"><thead><tr><th>Fase</th><th>Partido</th><th>Fecha</th><th>Cierre</th><th>Estado</th></tr></thead><tbody data-admin-matches></tbody></table></div></div>
    </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/config.js"></script><script src="assets/js/api.js"></script><script src="assets/js/app.js?v=20260602-6"></script><script src="assets/js/admin.js?v=20260602-6"></script>
</body>
</html>
